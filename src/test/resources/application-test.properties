spring.datasource.url=jdbc:mysql://localhost:3306/stepflow_test_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ROOT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update = テーブルが無ければ作成、あればそのまま使う（テスト間で drop しないので安定）
# create-drop は起動時に「無いテーブルの FK DROP」で WARN / スタックトレースが出やすい
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate のスキーマ生成 WARN（赤いスタックトレース）を抑える
logging.level.org.hibernate.tool.schema=ERROR

spring.mvc.hiddenmethod.filter.enabled=true

stepflow.demo-batch.flag-file=scripts/demo-batch.TEST-OFF

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
