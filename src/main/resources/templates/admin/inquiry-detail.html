<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>問い合わせ詳細</title>
	<th:block th:replace="~{common/layout-shell :: layout-styles}"></th:block>
</head>
<body>
	<button type="button" class="menu-trigger" id="js-hamburger">☰</button>
	<div th:replace="~{common/sidebar :: sidebar-fragment}"></div>
	<main class="main-content">
		<a th:href="@{/admin/inquiries}">一覧へ</a>
		<p th:if="${successMessage}" th:text="${successMessage}"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}"></p>
		<p th:text="${inquiry.inquiryDetail}"></p>
		<p>送信者: <span th:text="${sender != null ? sender.userName : '(不明)'}"></span></p>
		<p>所属: <span th:text="${affiliationDisplay}"></span></p>
		<form th:action="@{/admin/inquiries/{id}/status(id=${inquiry.inquiryId})}" method="post">
			<select name="inquiryStatus">
				<option value="未対応" th:selected="${inquiry.inquiryStatus == '未対応'}">未対応</option>
				<option value="対応中" th:selected="${inquiry.inquiryStatus == '対応中'}">対応中</option>
				<option value="対応済" th:selected="${inquiry.inquiryStatus == '対応済'}">対応済</option>
			</select>
			<button type="submit">保存</button>
		</form>
		<form th:action="@{/admin/inquiries/{id}/delete(id=${inquiry.inquiryId})}" method="post">
			<button type="submit">削除</button>
		</form>
	</main>
	<th:block th:replace="~{common/layout-shell :: layout-scripts}"></th:block>
</body>
</html>
