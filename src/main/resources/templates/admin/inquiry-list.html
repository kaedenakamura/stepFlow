<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>問い合わせ一覧（管理者）</title>
	<th:block th:replace="~{common/layout-shell :: layout-styles}"></th:block>
</head>
<body>
	<button type="button" class="menu-trigger" id="js-hamburger">☰</button>
	<div th:replace="~{common/sidebar :: sidebar-fragment}"></div>
	<main class="main-content">
		<h2>問い合わせ一覧</h2>
		<p th:if="${successMessage}" th:text="${successMessage}"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}"></p>
		<form th:action="@{/admin/inquiries}" method="get">
			<select name="status">
				<option value="">すべて</option>
				<option value="未対応" th:selected="${statusFilter == '未対応'}">未対応</option>
				<option value="対応中" th:selected="${statusFilter == '対応中'}">対応中</option>
				<option value="対応済" th:selected="${statusFilter == '対応済'}">対応済</option>
			</select>
			<button type="submit">絞り込み</button>
		</form>
		<table border="1" cellpadding="8">
			<tr>
				<th>内容</th><th>所属</th><th>氏名</th><th>ステータス</th><th></th>
			</tr>
			<tr th:each="row : ${rows}">
				<td th:text="${row.contentPreview}"></td>
				<td th:text="${row.affiliationDisplay}"></td>
				<td th:text="${row.userName}"></td>
				<td th:text="${row.inquiry.inquiryStatus}"></td>
				<td><a th:href="@{/admin/inquiries/{id}(id=${row.inquiry.inquiryId})}">詳細</a></td>
			</tr>
		</table>
	</main>
	<th:block th:replace="~{common/layout-shell :: layout-scripts}"></th:block>
</body>
</html>
