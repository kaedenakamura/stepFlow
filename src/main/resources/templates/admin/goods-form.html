<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title>商品登録（管理者用）</title>
        <th:block th:replace="~{common/layout-shell :: layout-styles}"></th:block>
    </head>
    <body>
        <button type="button" class="menu-trigger" id="js-hamburger">☰</button>
        <div th:replace="~{common/sidebar :: sidebar-fragment}"></div>
        <main class="main-content">

        <h2 style="text-align: center;">商品登録（管理者用）</h2>
        <p th:if="${successMessage != null}" style="color:green; text-align: center; margin-bottom: 20px;">
            <p th:text="${successMessage}">登録完了しました</p>
        </p>
        <p th:if="${errorMessage != null}" style="color:red; text-align: center; margin-bottom:20px;">
            <p th:text="${errorMessage}">エラーが発生しました</p>
        </p>
        <h2 th:text="${goods.goodsId == null} ? '新規商品登録' : '商品編集'">商品登録・編集
        </h2>
        <form th:action="@{/admin/goods}" th:object="${goods}" method="post" style="width: 300px; margin: 0 auto;">
                <!-- 編集時用：主キーを hidden で送る -->
                 <input type="hidden" th:field="*{goodsId}">
            <div class="form-group">
                <label>商品名:</label>
                <input type="text" th:field="*{goodsName}" placeholder="商品名を入力してください"/>
                <p th:if="${#fields.hasErrors('goodsName')}" th:errors="*{goodsName}" style="color:red;"></p>
            </div>
            <div class="form-group">
                <label>カテゴリー:</label>
                <select th:field="*{categoryId}">
                    <option value="" disabled selected>カテゴリーを選択してください</option>
                    <option th:each="category : ${categories}" th:value="${category.categoryId}" 
                    th:text="${category.categoryName}">カテゴリー名（食品）</option>
                </select>
                <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" style="color:red;">
                    カテゴリーerror</p>

            </div>
            <button type="submit"
            th:text="${goods.goodsId == null} ? '登録' : '更新'">
            </button>
        </form>
           <a th:href="@{/admin/goods}">戻る</a>
        </main>
        <th:block th:replace="~{common/layout-shell :: layout-scripts}"></th:block>
    </body>
</html>
