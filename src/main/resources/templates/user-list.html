<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>ユーザー一覧 - 管理システム</title>
	<th:block th:replace="~{common/layout-shell :: layout-styles}"></th:block>
	<style>
		.user-list {
			width: 90%;
			max-width: 900px;
		}
		.user-list th, .user-list td {
			text-align: center;
		}
		.user-list tr:nth-child(even) {
			background-color: #f9f9f9;
		}
	</style>
</head>
<body>
	<button type="button" class="menu-trigger" id="js-hamburger">☰</button>
	<div th:replace="~{common/sidebar :: sidebar-fragment}"></div>
	<main class="main-content">
		<h1>ユーザー一覧（管理者用）</h1>
		<div class="page-actions">
			<a th:href="@{/users/new}">＋ 新規ユーザー登録</a>
		</div>
		<form th:action="@{/users}" method="get" class="filters">
			<div class="group">
				<label for="authorityId">絞り込み</label>
				<select name="authorityId" id="authorityId">
				<option value="" >すべてのユーザー</option>
				<option value="1" th:selected="${selectedAuthorityId != null && selectedAuthorityId == 1}">管理者</option>
				<option value="2" th:selected="${selectedAuthorityId != null && selectedAuthorityId == 2}">店舗スタッフ</option>
				<option value="3" th:selected="${selectedAuthorityId != null && selectedAuthorityId == 3}">倉庫スタッフ</option>
			</select>
			</div>
			<button type="submit">絞り込む</button>
		</form>

		<table class="user-list">
			<thead>
				<tr>
					<th>ID</th>
					<th>名前</th>
					<th>性別</th>
					<th>権限</th>
					<th>所属</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="user : ${users}">
					<td th:text="${user.userId}">ID</td>
					<td th:text="${user.userName}">名前</td>
					<td th:text="${user.userGender == 1 ? '男' : (user.userGender == 2 ? '女' : 'その他')}">性別</td>
					<td th:text="${user.authorityId == 1 ? '管理者' : (user.authorityId == 2 ? '店舗スタッフ' : '倉庫スタッフ')}">権限</td>
					<td th:text="${user.shopId != null && user.shopId != '' ? user.shopId : (user.warehouseId != null && user.warehouseId != '' ? user.warehouseId : '未所属')}">所属</td>
					<td>
						<a th:href="@{/users/edit/{id}(id=${user.userId})}">編集</a>
						<form th:action="@{/users/delete/{id}(id=${user.userId})}" method="post" style="display:inline;">
							<button type="submit" onclick="return confirm('本当に削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</main>
	<th:block th:replace="~{common/layout-shell :: layout-scripts}"></th:block>
</body>
</html>
