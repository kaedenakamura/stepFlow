<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 管理者画面などで共通利用するサイドバー用スタイル・スクリプト -->
<th:block th:fragment="layout-styles">
	<style>
		body {
			font-family: sans-serif;
			margin: 0;
			padding: 0;
			display: flex;
			background: #f8fafc;
			overflow-x: hidden;
		}
		.menu-trigger {
			position: fixed;
			top: 20px;
			left: 20px;
			z-index: 1000;
			background: #2c3e50;
			color: #fff;
			border: none;
			padding: 12px 16px;
			font-size: 20px;
			border-radius: 6px;
			cursor: pointer;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			transition: all 0.3s ease;
		}
		.sidebar {
			position: fixed;
			top: 0;
			left: -260px;
			width: 260px;
			height: 100vh;
			background: #1e293b;
			color: #f8fafc;
			padding: 30px 20px;
			box-sizing: border-box;
			transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			z-index: 900;
		}
		.sidebar h2 {
			font-size: 24px;
			color: #38bdf8;
			margin-bottom: 25px;
			margin-top: 40px;
			border-left: 4px solid #38bdf8;
			padding-left: 10px;
		}
		.sidebar a {
			color: #cbd5e1;
			display: block;
			padding: 12px 0;
			text-decoration: none;
			border-bottom: 1px solid #334155;
			font-size: 15px;
		}
		.sidebar a:hover {
			color: #fff;
			background: #334155;
			padding-left: 5px;
		}
		.login-info {
			font-size: 13px;
			color: #94a3b8;
		}
		.role-label {
			font-size: 11px;
			margin-top: 25px;
			margin-bottom: 5px;
			font-weight: bold;
			text-transform: uppercase;
			letter-spacing: 1px;
		}
		.role-admin { color: #f87171; }
		.role-shop { color: #fbbf24; }
		.role-warehouse { color: #38bdf8; }
		.logout-btn {
			background: #ef4444;
			color: white;
			border: none;
			padding: 10px;
			border-radius: 4px;
			cursor: pointer;
			width: 100%;
			margin-top: 10px;
			font-weight: bold;
		}
		.main-content {
			flex: 1;
			padding: 40px;
			padding-top: 100px;
			transition: 0.3s;
			width: 100%;
			max-width: 1200px;
			margin: 0 auto;
			box-sizing: border-box;
		}
		.main-content h1,
		.main-content h2 {
			text-align: center;
		}
		.main-content .page-actions {
			text-align: center;
			margin: 16px 0;
		}
		.main-content .filters {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			align-items: flex-end;
			justify-content: center;
			margin: 16px auto;
			max-width: 100%;
		}
		.main-content .filters .group {
			display: inline-flex;
			flex-direction: column;
			gap: 4px;
		}
		.main-content .filters label {
			font-weight: bold;
		}
		.main-content .empty-message,
		.main-content .page-message {
			text-align: center;
			margin: 16px 0;
		}
		.main-content .msg-ok {
			color: green;
			text-align: center;
		}
		.main-content .msg-ng {
			color: red;
			text-align: center;
		}
		.main-content table {
			border-collapse: collapse;
			margin-top: 20px;
			margin-left: auto;
			margin-right: auto;
		}
		.main-content table th,
		.main-content table td {
			border: 1px solid #ccc;
			padding: 8px 12px;
		}
		.main-content table th {
			background-color: #f2f2f2;
		}
		.main-content .filters .btn-export {
			display: inline-flex;
			align-items: center;
			padding: 8px 16px;
			background-color: #007bff;
			color: white;
			text-decoration: none;
			border-radius: 4px;
		}
		.main-content .filters .btn-export:hover {
			background-color: #0056b3;
		}
		body.is-open .sidebar { left: 0; }
		body.is-open .menu-trigger { left: 280px; }
	</style>
</th:block>

<th:block th:fragment="layout-scripts">
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const hamburger = document.getElementById("js-hamburger");
			if (!hamburger) return;
			hamburger.addEventListener("click", function () {
				document.body.classList.toggle("is-open");
				hamburger.textContent = document.body.classList.contains("is-open") ? "✖" : "☰";
			});
		});
	</script>
</th:block>
</html>
