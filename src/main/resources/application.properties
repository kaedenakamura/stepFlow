spring.application.name=stepflow
#  接続先の設定（MySQLの住所）
# 環境変数【SPRING_DATASOURCE_URL】があればそれを使い、無ければローカルの3306番（localhost）を見に行く設定！
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stepflow_db?useSSL=false&allowPublicKeyRetrieval=true}

#  ユーザー名とパスワードの設定（MySQLのユーザー名とパスワード）
# ユーザー名（環境変数から読み込む。無ければ root）
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# パスワード（環境変数から読み込む。無ければ ROOT）
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ROOT}


# MySQLの通信用部品（Driver）の指定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  Hibernateの設定（SQLを自動で調整してくれる機能）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleafの設定 method='post' を使用するための設定 
spring.mvc.hiddenmethod.filter.enabled=true

# ============================================================
# Demo batch（学習用）設定
# scripts/demo-batch.ON がある間だけ、5分ごとにユーザーを1件追加
# ============================================================

# フラグファイルのパス（start-demo-user-batch.bat が作るファイル）
stepflow.demo-batch.flag-file=scripts/demo-batch.ON

# アプリ起動後、最初の1回までの待ち時間（ミリ秒）10000 = 10秒
stepflow.demo-batch.initial-delay-ms=10000

# 2回目以降の間隔（ミリ秒）300000 = 5分 / テストなら 60000 = 1分
stepflow.demo-batch.interval-ms=300000

# A4: Excel アップロードの最大サイズ（大きいファイル用・任意）
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


