# 本番用 Docker Compose
#
# 初回起動:
#   1. cp .env.prod.example .env.prod  （パスワードを変更）
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# 停止:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down
#
# DB を初期化し直す場合（データ全削除）:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down -v
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: mysql:8.0
    container_name: stepflow-prod-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: stepflow_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped
    networks:
      - stepflow-prod

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stepflow-prod-app
    ports:
      - "${APP_PORT:-9138}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/stepflow_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stepflow-prod

volumes:
  mysql_prod_data:

networks:
  stepflow-prod:
    driver: bridge
