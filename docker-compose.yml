services:
  db:
    image: mysql:8.0
    container_name: stepflow-db
    environment:
      MYSQL_ROOT_PASSWORD: ROOT
      MYSQL_DATABASE: stepflow_db
      MYSQL_USER: stepflow_user
      MYSQL_PASSWORD: ROOT
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pROOT"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  web:
    image: eclipse-temurin:17-jdk-focal
    container_name: stepflow-app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/stepflow_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ROOT
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "chmod +x ./mvnw && ./mvnw -DskipTests spring-boot:run"
    restart: unless-stopped

volumes:
  mysql_data:
  maven_cache:
